name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

  quality:
    # Stable required-status name for branch protection, gating the whole matrix.
    # if: always() is load-bearing — a skipped required job counts as SUCCESS
    # for branch protection, so this job must run and fail explicitly.
    name: Verify package
    if: always()
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail unless every matrix leg passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "matrix result: ${{ needs.test.result }}"
            exit 1
          fi
          echo "all matrix legs passed"
