name: Evidence snapshot

# GitHub's traffic API retains only 14 days of views/clones — this weekly
# snapshot preserves adoption history (stars, forks, traffic, referrers, PyPI
# downloads) as append-only JSONL on the 'evidence' branch.

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    name: Capture adoption metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout evidence branch (create if absent)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Switch to evidence branch
        shell: bash
        run: |
          if git fetch origin evidence:evidence 2>/dev/null; then
            git checkout evidence
          else
            git checkout --orphan evidence
            git rm -rfq . 2>/dev/null || true
          fi

      - name: Capture snapshot
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="$GITHUB_REPOSITORY"
          date=$(date -u +%Y-%m-%d)
          # Traffic endpoints can return 202 with an EMPTY body while GitHub is
          # still computing stats, and pypistats can serve non-JSON error pages —
          # validate every fragment or jq --argjson dies with exit 2.
          ensure_json() { echo "$1" | jq -e . >/dev/null 2>&1 && echo "$1" || echo "$2"; }
          repo_json=$(gh api "repos/$repo")
          repo_json=$(ensure_json "$repo_json" '{}')
          views=$(ensure_json "$(gh api "repos/$repo/traffic/views" 2>/dev/null || true)" '{}')
          clones=$(ensure_json "$(gh api "repos/$repo/traffic/clones" 2>/dev/null || true)" '{}')
          referrers=$(ensure_json "$(gh api "repos/$repo/traffic/popular/referrers" 2>/dev/null || true)" '[]')
          pypi=$(ensure_json "$(curl -fsS "https://pypistats.org/api/packages/caucus/recent" 2>/dev/null || true)" '{}')
          jq -cn \
            --arg date "$date" \
            --argjson repo "$repo_json" \
            --argjson views "$views" \
            --argjson clones "$clones" \
            --argjson referrers "$referrers" \
            --argjson pypi "$pypi" \
            '{date: $date,
              stars: $repo.stargazers_count,
              forks: $repo.forks_count,
              open_issues: $repo.open_issues_count,
              views: {count: $views.count, uniques: $views.uniques},
              clones: {count: $clones.count, uniques: $clones.uniques},
              referrers: $referrers,
              pypi_recent: $pypi.data}' >> adoption.jsonl
          tail -1 adoption.jsonl

      - name: Commit snapshot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add adoption.jsonl
          git commit -m "Evidence snapshot $(date -u +%Y-%m-%d)"
          git push origin evidence
