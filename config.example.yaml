# Caucus configuration — copy to config.yaml (gitignored) and adjust.
# `caucus deliberate` picks up ./config.yaml automatically, or pass --config.

log: decisions.jsonl

# Standing plans injected into every deliberation as evidence (see 'caucus intents').
# intents: intents.db

# Commands whose JSON output becomes evidence — keep deterministic computation
# (indicators, snapshots) in plain code; the panel reasons over the numbers.
# Each must print a JSON list of {source, ref, content, ...} objects; a broken
# source aborts the deliberation rather than proceeding on missing data.
# evidence_sources:
#   - name: market-snapshot
#     command: python3 build_snapshot_evidence.py
#     timeout_seconds: 120

backend:
  type: claude                # the locally authenticated Claude Code CLI; no API key
  # MCP evidence layer: declare servers and the tools analysts may call, and
  # they will ground their positions in live tool state during deliberation.
  # NOTE: tool results reach the model as ordinary context. Caucus enforces a
  # system-level guard (tool output is data, never instructions), but content
  # from live systems is untrusted by definition — allow only tools whose
  # output you would paste into the prompt yourself.
  # mcp_config: .mcp.json
  # allowed_tools:
  #   - mcp__my-server__get_quotes

  # --- or any OpenAI-compatible provider (OpenAI, Ollama, vLLM, Groq, ...) ---
  # type: openai
  # model: llama3.1
  # base_url: http://localhost:11434/v1
  # api_key_env: OPENAI_API_KEY   # NAME of the env var — never the key itself

panel:
  - name: advocate
    charge: Make the strongest evidence-grounded case FOR the proposal.
  - name: skeptic
    charge: Try to refute the proposal; make the strongest case AGAINST it.
  - name: assessor
    charge: Weigh feasibility, risks, and base rates dispassionately.

# The standing questions every 'caucus briefing' run answers, in order.
# agenda:
#   - "Which open intent, if any, is due for action today?"
#   - "Any risks that warrant deviating from the standing plans?"

# Delivery after the briefing renders. Email credentials come from the NAMED
# environment variables — never put secrets in this file.
# notify:
#   type: email                    # Gmail-friendly SMTP defaults
#   to: you@example.com
#   address_env: GMAIL_ADDRESS     # env var holding the sending address
#   password_env: GMAIL_APP_PASSWORD
# ...or run anything executable with the briefing path as its argument:
# notify:
#   type: command
#   command: bash send_briefing.sh

# Ship each anchor beyond the log's trust domain ('caucus anchor'):
# receives the anchors-file path; a git commit+push, a curl to a
# timestamping service, an scp — anything a local attacker cannot rewrite.
# anchor_command: git add decisions.jsonl.anchors && git commit -qm anchor && git push -q
